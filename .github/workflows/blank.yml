name: CI Web Shell
on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3

4. حالا دوباره به تب **Actions** بروید، از منوی سمت چپ روی `CI Web Shell` کلیک کنید و در سمت راست دکمه **Run workflow** را بزنید.
5. یک پروسه شروع به اجرا می‌کند. روی آن کلیک کنید تا لاگ‌های (Logs) آن را ببینید.
6. در بخش لاگ‌ها، مرحله `Setup tmate session` را باز کنید. در آنجا یک **لینک وب (Web URL)** به شما می‌دهد.
7. آن لینک را در مرورگر خود کپی و باز کنید. یک ترمینال تحت وب مستقیماً در مرورگر شما باز می‌شود.
8. از داخل آن ترمینال (که روی سرورهای گیت‌هاب است) می‌توانید به سرور خودتان SSH بزنید.

**چرا این دو روش جواب می‌دهند؟**
زیرا در هر دو روش، سیستم شرکتِ شما فقط یک ارتباط استاندارد وب (HTTPS) با دامنه‌های مجاز گیت‌هاب برقرار می‌کند. درخواست SSH شما از داخل سرورهای قدرتمند گیت‌هاب به سمت سرور شخصی‌تان ارسال می‌شود و فایروال شرکت اصلاً متوجه مقصد نهایی شما نخواهد شد.
